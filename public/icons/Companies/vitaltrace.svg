<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="vital-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFA5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00897B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004D40;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Medical Cross base -->
  <rect fill="url(#vital-grad)" width="200" height="200" rx="20"/>

  <!-- ECG/Heart Monitor Line -->
  <path d="M20 100 L50 100 L60 80 L70 120 L80 60 L90 140 L100 100 L180 100"
        fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Heartbeat pulse circle -->
  <circle cx="100" cy="100" r="8" fill="#FF6B6B" opacity="0.8">
    <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Medical plus symbol -->
  <path d="M100 40 L100 60 M90 50 L110 50" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>

  <!-- Life indicator dots -->
  <circle cx="30" cy="50" r="4" fill="#4CAF50"/>
  <circle cx="170" cy="50" r="4" fill="#4CAF50"/>
  <circle cx="30" cy="150" r="4" fill="#4CAF50"/>
  <circle cx="170" cy="150" r="4" fill="#4CAF50"/>
</svg>
