<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="mirth-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#mirth-grad)" width="256" height="256" rx="25"/>

  <!-- Connection nodes -->
  <circle cx="60" cy="80" r="20" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="196" cy="80" r="20" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="60" cy="176" r="20" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="196" cy="176" r="20" fill="#FFFFFF" opacity="0.9"/>

  <!-- Center hub -->
  <circle cx="128" cy="128" r="35" fill="#FFFFFF" opacity="0.9"/>

  <!-- Connection lines with animation -->
  <line x1="80" y1="80" x2="93" y2="103" stroke="#FFFFFF" stroke-width="4" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="176" y1="80" x2="163" y2="103" stroke="#FFFFFF" stroke-width="4" opacity="0.6">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="80" y1="176" x2="93" y2="153" stroke="#FFFFFF" stroke-width="4" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </line>
  <line x1="176" y1="176" x2="163" y2="153" stroke="#FFFFFF" stroke-width="4" opacity="0.6">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </line>

  <!-- Data packets -->
  <circle cx="106" cy="92" r="4" fill="#E74C3C">
    <animate attributeName="cx" values="80;106;128" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;92;128" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Center M for Mirth -->
  <text x="128" y="145" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#3498DB" text-anchor="middle">M</text>

  <!-- Integration symbol -->
  <path d="M128 30 L128 50 M128 206 L128 226 M30 128 L50 128 M206 128 L226 128" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
