<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="figma-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F24E1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7262;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="figma-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7262;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA629;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="figma-yellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA629;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDCA58;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="figma-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABCFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ACF83;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="figma-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A259FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ABCFE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left column: Red, Orange, Yellow rectangles -->
  <rect x="0" y="0" width="100" height="100" rx="50" fill="url(#figma-red)"/>
  <rect x="0" y="100" width="100" height="100" rx="50" fill="url(#figma-orange)"/>
  <rect x="0" y="200" width="100" height="100" rx="50" fill="url(#figma-yellow)"/>

  <!-- Right column: Purple circle and Blue rectangle -->
  <circle cx="100" cy="50" r="50" fill="url(#figma-blue)"/>
  <circle cx="100" cy="250" r="50" fill="url(#figma-green)"/>
</svg>
