<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="hl7-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#hl7-grad)" width="256" height="256" rx="25"/>

  <!-- Medical Cross -->
  <path fill="#FFFFFF" d="M128 40 L128 110 L58 110 L58 146 L128 146 L128 216 L164 216 L164 146 L234 146 L234 110 L164 110 L164 40 Z" opacity="0.3"/>

  <!-- HL7 Text -->
  <text x="128" y="155" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFFFFF" text-anchor="middle">HL7</text>

  <!-- Health Level indicator -->
  <circle cx="40" cy="40" r="8" fill="#2ECC71">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="216" cy="40" r="8" fill="#2ECC71">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Data flow lines -->
  <path d="M40 220 L80 220 M100 220 L140 220 M160 220 L200 220" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
