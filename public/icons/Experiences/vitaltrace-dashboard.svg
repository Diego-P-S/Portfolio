<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#bg-grad)" width="800" height="600"/>

  <!-- Dashboard Header -->
  <rect x="20" y="20" width="760" height="60" fill="#263238" rx="8"/>
  <text x="40" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#00BFA5">VitalTrace Dashboard</text>
  <circle cx="720" cy="50" r="15" fill="#4CAF50"/>
  <circle cx="760" cy="50" r="15" fill="#2196F3"/>

  <!-- Main Content Area - DelivAssure Monitor -->
  <rect x="20" y="100" width="500" height="280" fill="#37474F" rx="8"/>
  <text x="40" y="130" font-family="Arial" font-size="20" font-weight="bold" fill="#FFFFFF">DelivAssure - Real-time Monitor</text>

  <!-- ECG-like waveform -->
  <path d="M40 180 L100 180 L120 150 L140 210 L160 120 L180 240 L200 180 L500 180"
        fill="none" stroke="#00BFA5" stroke-width="3"/>
  <path d="M40 250 L80 250 L100 230 L120 270 L140 220 L160 280 L180 250 L500 250"
        fill="none" stroke="#FF6B6B" stroke-width="3"/>

  <!-- Status indicators -->
  <circle cx="60" cy="320" r="8" fill="#4CAF50">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="80" y="327" font-family="Arial" font-size="16" fill="#FFFFFF">Device Connected</text>

  <rect x="250" y="310" width="80" height="40" fill="#2196F3" rx="4"/>
  <text x="270" y="337" font-family="Arial" font-size="14" fill="#FFFFFF">3.2 mM</text>

  <rect x="350" y="310" width="100" height="40" fill="#FF9800" rx="4"/>
  <text x="365" y="337" font-family="Arial" font-size="14" fill="#FFFFFF">Normal</text>

  <!-- Sidebar - Patient Info -->
  <rect x="540" y="100" width="240" height="280" fill="#37474F" rx="8"/>
  <text x="560" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#FFFFFF">Patient Monitor</text>

  <text x="560" y="170" font-family="Arial" font-size="14" fill="#B0BEC5">Lactate Level:</text>
  <text x="560" y="195" font-family="Arial" font-size="24" font-weight="bold" fill="#00BFA5">3.2 mM/L</text>

  <text x="560" y="235" font-family="Arial" font-size="14" fill="#B0BEC5">Status:</text>
  <text x="560" y="260" font-family="Arial" font-size="18" font-weight="bold" fill="#4CAF50">SAFE</text>

  <text x="560" y="300" font-family="Arial" font-size="14" fill="#B0BEC5">Duration:</text>
  <text x="560" y="325" font-family="Arial" font-size="18" fill="#FFFFFF">02:34:12</text>

  <!-- Bottom panels - Analytics -->
  <rect x="20" y="400" width="370" height="180" fill="#37474F" rx="8"/>
  <text x="40" y="430" font-family="Arial" font-size="18" font-weight="bold" fill="#FFFFFF">Trend Analysis</text>

  <!-- Simple bar chart -->
  <rect x="50" y="520" width="40" height="40" fill="#00BFA5"/>
  <rect x="110" y="490" width="40" height="70" fill="#00BFA5"/>
  <rect x="170" y="510" width="40" height="50" fill="#00BFA5"/>
  <rect x="230" y="480" width="40" height="80" fill="#FF9800"/>
  <rect x="290" y="500" width="40" height="60" fill="#4CAF50"/>

  <rect x="410" y="400" width="370" height="180" fill="#37474F" rx="8"/>
  <text x="430" y="430" font-family="Arial" font-size="18" font-weight="bold" fill="#FFFFFF">Alerts & Notifications</text>

  <circle cx="450" cy="470" r="6" fill="#4CAF50"/>
  <text x="470" y="476" font-family="Arial" font-size="14" fill="#FFFFFF">All systems normal</text>

  <circle cx="450" cy="510" r="6" fill="#2196F3"/>
  <text x="470" y="516" font-family="Arial" font-size="14" fill="#FFFFFF">Data logged successfully</text>

  <circle cx="450" cy="550" r="6" fill="#00BFA5"/>
  <text x="470" y="556" font-family="Arial" font-size="14" fill="#FFFFFF">Continuous monitoring active</text>
</svg>
