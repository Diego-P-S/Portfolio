<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="test-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#212121;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#424242;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#test-bg-grad)" width="800" height="600"/>

  <!-- Code Editor Header -->
  <rect x="0" y="0" width="800" height="40" fill="#1E1E1E"/>
  <circle cx="20" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="20" r="6" fill="#28C840"/>
  <text x="100" y="27" font-family="monospace" font-size="14" fill="#CCCCCC">test_delivassure.py - Qt Creator</text>

  <!-- Main Content - Split view -->
  <!-- Left: Code Editor -->
  <rect x="0" y="40" width="500" height="560" fill="#1E1E1E"/>

  <!-- Line numbers -->
  <rect x="0" y="40" width="40" height="560" fill="#252526"/>
  <text x="10" y="70" font-family="monospace" font-size="12" fill="#858585">1</text>
  <text x="10" y="90" font-family="monospace" font-size="12" fill="#858585">2</text>
  <text x="10" y="110" font-family="monospace" font-size="12" fill="#858585">3</text>
  <text x="10" y="130" font-family="monospace" font-size="12" fill="#858585">4</text>
  <text x="10" y="150" font-family="monospace" font-size="12" fill="#858585">5</text>
  <text x="10" y="170" font-family="monospace" font-size="12" fill="#858585">6</text>
  <text x="10" y="190" font-family="monospace" font-size="12" fill="#858585">7</text>
  <text x="10" y="210" font-family="monospace" font-size="12" fill="#858585">8</text>
  <text x="10" y="230" font-family="monospace" font-size="12" fill="#858585">9</text>

  <!-- Code content -->
  <text x="50" y="70" font-family="monospace" font-size="13" fill="#569CD6">import</text>
  <text x="105" y="70" font-family="monospace" font-size="13" fill="#DCDCAA"> pytest</text>

  <text x="50" y="90" font-family="monospace" font-size="13" fill="#569CD6">from</text>
  <text x="90" y="90" font-family="monospace" font-size="13" fill="#4EC9B0"> delivassure</text>
  <text x="195" y="90" font-family="monospace" font-size="13" fill="#569CD6"> import</text>
  <text x="250" y="90" font-family="monospace" font-size="13" fill="#DCDCAA"> LactateMonitor</text>

  <text x="50" y="130" font-family="monospace" font-size="13" fill="#569CD6">def</text>
  <text x="85" y="130" font-family="monospace" font-size="13" fill="#DCDCAA"> test_lactate_sensor_accuracy</text>
  <text x="320" y="130" font-family="monospace" font-size="13" fill="#D4D4D4">():</text>

  <text x="70" y="150" font-family="monospace" font-size="13" fill="#6A9955">"""Test sensor accuracy within FDA specs"""</text>

  <text x="70" y="170" font-family="monospace" font-size="13" fill="#D4D4D4">monitor = LactateMonitor()</text>

  <text x="70" y="190" font-family="monospace" font-size="13" fill="#D4D4D4">reading = monitor.</text>
  <text x="220" y="190" font-family="monospace" font-size="13" fill="#DCDCAA">get_lactate_level</text>
  <text x="360" y="190" font-family="monospace" font-size="13" fill="#D4D4D4">()</text>

  <text x="70" y="210" font-family="monospace" font-size="13" fill="#C586C0">assert</text>
  <text x="125" y="210" font-family="monospace" font-size="13" fill="#B5CEA8"> 0.5</text>
  <text x="165" y="210" font-family="monospace" font-size="13" fill="#D4D4D4"> &lt;= reading &lt;= </text>
  <text x="305" y="210" font-family="monospace" font-size="13" fill="#B5CEA8">15.0</text>

  <text x="70" y="230" font-family="monospace" font-size="13" fill="#C586C0">assert</text>
  <text x="125" y="230" font-family="monospace" font-size="13" fill="#D4D4D4"> monitor.status == </text>
  <text x="300" y="230" font-family="monospace" font-size="13" fill="#CE9178">"SAFE"</text>

  <!-- Right: Test Results Panel -->
  <rect x="500" y="40" width="300" height="560" fill="#252526"/>

  <text x="520" y="70" font-family="Arial" font-size="16" font-weight="bold" fill="#4EC9B0">Test Results</text>

  <!-- Test status -->
  <rect x="520" y="90" width="260" height="40" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="110" r="8" fill="#4CAF50"/>
  <text x="560" y="115" font-family="monospace" font-size="14" fill="#FFFFFF">test_lactate_sensor_accuracy</text>

  <rect x="520" y="140" width="260" height="40" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="160" r="8" fill="#4CAF50"/>
  <text x="560" y="165" font-family="monospace" font-size="14" fill="#FFFFFF">test_safety_thresholds</text>

  <rect x="520" y="190" width="260" height="40" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="210" r="8" fill="#4CAF50"/>
  <text x="560" y="215" font-family="monospace" font-size="14" fill="#FFFFFF">test_data_transmission</text>

  <rect x="520" y="240" width="260" height="40" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="260" r="8" fill="#FF9800">
    <animate attributeName="opacity" values="1;0.5;1" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <text x="560" y="265" font-family="monospace" font-size="14" fill="#FFFFFF">test_edge_cases (running...)</text>

  <!-- Coverage Stats -->
  <text x="520" y="320" font-family="Arial" font-size="14" font-weight="bold" fill="#CCCCCC">Code Coverage</text>

  <rect x="520" y="330" width="260" height="20" fill="#1E1E1E" rx="2"/>
  <rect x="520" y="330" width="234" height="20" fill="#4CAF50" rx="2"/>
  <text x="635" y="345" font-family="monospace" font-size="12" fill="#FFFFFF">90%</text>

  <!-- CI/CD Status -->
  <text x="520" y="380" font-family="Arial" font-size="14" font-weight="bold" fill="#CCCCCC">CI/CD Pipeline</text>

  <rect x="520" y="395" width="260" height="30" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="410" r="6" fill="#4CAF50"/>
  <text x="560" y="415" font-family="Arial" font-size="12" fill="#FFFFFF">Build: Passing</text>

  <rect x="520" y="435" width="260" height="30" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="450" r="6" fill="#4CAF50"/>
  <text x="560" y="455" font-family="Arial" font-size="12" fill="#FFFFFF">Tests: 47/47 passed</text>

  <rect x="520" y="475" width="260" height="30" fill="#1E1E1E" rx="4"/>
  <circle cx="540" cy="490" r="6" fill="#2196F3"/>
  <text x="560" y="495" font-family="Arial" font-size="12" fill="#FFFFFF">Zephyr: Synced</text>

  <!-- GitHub Actions badge -->
  <rect x="520" y="530" width="120" height="30" fill="#2088FF" rx="4"/>
  <text x="535" y="550" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">GitHub Actions</text>

  <rect x="650" y="530" width="130" height="30" fill="#4CAF50" rx="4"/>
  <text x="675" y="550" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">✓ All Checks</text>
</svg>
